# Builds and publishes the Docker image to GitHub Container Registry.
#
# Triggers:
#   - Push of a version tag (e.g. v1.0.0) → builds, tags, and pushes the image
#   - Pull request to main              → builds only (no push), to catch Dockerfile errors
#
# After the image is published, users install with:
#   docker run -p 8501:8501 \
#     -v "%USERPROFILE%\.freecad-agent:/root/.freecad-agent" \
#     ghcr.io/areddy03/freecad-agent:latest

name: Build & Publish Docker Image

on:
  push:
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Tag with the full semver version (e.g. v1.2.3)
            type=semver,pattern={{version}}
            # Tag with major.minor (e.g. v1.2)
            type=semver,pattern={{major}}.{{minor}}
            # Always update :latest on a release tag
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache layers between builds to speed up the knowledge-base ingest stage
          cache-from: type=gha
          cache-to: type=gha,mode=max
